name: Build and Upload Kernel Modules

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: 'Target architecture (e.g., arm64, x86_64)'
        required: true
        type: string
      kernel_version:
        description: 'Kernel version to build against'
        required: false
        type: string
        default: '5.15'

env:
  OUTPUT_PATH: out            # 构建输出目录（相对于 android-kernel 目录）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. 设置构建环境（示例：安装依赖）
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            build-essential \
            flex bison \
            libssl-dev \
            bc \
            cpio \
            git

      # 3. 构建内核模块（此处为示例构建命令，请根据实际项目调整）
      - name: Build kernel modules
        run: |
          cd android-kernel
          export ARCH=${{ github.event.inputs.target_arch }}
          export CROSS_COMPILE=aarch64-linux-gnu-
          # 假设构建配置和模块编译指令
          make defconfig
          make modules_prepare
          make M=drivers/sample modules  # 示例路径，请修改为实际模块路径
          mkdir -p ${{ env.OUTPUT_PATH }}
          find . -name "*.ko" -exec cp --parents {} ${{ env.OUTPUT_PATH }}/ \;

      # 4. 列出所有找到的 .ko 文件（方便日志查看）
      - name: List ko files
        run: |
          echo "Searching for .ko files in android-kernel/${{ env.OUTPUT_PATH }}"
          find android-kernel/${{ env.OUTPUT_PATH }} -name "*.ko" -print

      # 5. 上传所有 .ko 文件作为 artifact（仅上传 ko，不打包）
      - name: Upload ko files
        uses: actions/upload-artifact@v4.6.2
        with:
          name: kernel-driver-${{ github.event.inputs.target_arch }}
          path: android-kernel/${{ env.OUTPUT_PATH }}/**/*.ko
