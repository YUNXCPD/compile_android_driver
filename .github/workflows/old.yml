name: Android Kernel Driver Builder (Fixed)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version (Kernel) (e.g., 14)'
        required: true
      kernel_version:
        description: 'Kernel Version (e.g., 6.1)'
        required: true
      driver_name:
        description: 'Driver Module Name (e.g., yunwu.ko)'
        required: true
      target_arch:
        description: 'Target Architecture (aarch64, x86_64, etc.)'
        required: true
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        
      - name: Prepare kerneldriver directory
        run: |
          mkdir kerneldriver
          mv ./code/*.h ./code/*.c ./code/Makefile kerneldriver/
          
      - name: Install repo tool
        run: |
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: Set up Android Kernel source
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }}
          repo sync -j$(nproc) -c --no-tags --optimized-fetch --force-sync

      - name: Install dependencies & cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison libssl-dev libelf-dev bc python-is-python3
          # 安装交叉编译工具链
          if [ "${{ github.event.inputs.target_arch }}" = "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          elif [ "${{ github.event.inputs.target_arch }}" = "x86_64" ]; then
            sudo apt-get install -y gcc-x86-64-linux-gnu
          fi

      - name: Build kernel (Android 13 and below)
        if: ${{ github.event.inputs.android_version <= 13 }}
        run: |
          cd android-kernel
          BUILD_CONFIG=common/build.config.gki.${{ github.event.inputs.target_arch }} LTO=thin build/build.sh -j32
          # 内核构建输出目录通常在 out/ 下，找到 dist 目录
          KERNEL_OUT=$(find out -name "dist" -type d | head -1)
          echo "KERNEL_OUT=$KERNEL_OUT" >> $GITHUB_ENV

      - name: Build kernel (Android 14+ with Bazel)
        if: ${{ github.event.inputs.android_version > 13 }}
        run: |
          cd android-kernel
          # 构建内核，启用 sandbox_debug 以便看到具体错误
          tools/bazel build --sandbox_debug //common:kernel_${{ github.event.inputs.target_arch }}_dist 2>&1 | tee bazel_build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Bazel build failed, showing log tail:"
            tail -50 bazel_build.log
            exit 1
          fi
          # 找到 Bazel 生成的 tar.gz 产物并解压，作为内核构建输出目录
          ARTIFACT=$(find bazel-out -name "kernel_*.tar.gz" | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "Could not find kernel dist tarball"
            exit 1
          fi
          mkdir -p /tmp/kernel_dist
          tar -xzf "$ARTIFACT" -C /tmp/kernel_dist
          KERNEL_OUT="/tmp/kernel_dist"
          echo "KERNEL_OUT=$KERNEL_OUT" >> $GITHUB_ENV

      - name: Build external kernel module
        run: |
          cd android-kernel
          # 确认内核输出目录存在
          if [ ! -d "$KERNEL_OUT" ]; then
            echo "KERNEL_OUT directory not found: $KERNEL_OUT"
            exit 1
          fi
          # 设置架构和交叉编译器
          if [ "${{ github.event.inputs.target_arch }}" = "aarch64" ]; then
            export ARCH=arm64
            export CROSS_COMPILE=aarch64-linux-gnu-
          elif [ "${{ github.event.inputs.target_arch }}" = "x86_64" ]; then
            export ARCH=x86_64
            export CROSS_COMPILE=x86_64-linux-gnu-
          fi
          
          # 将驱动源码复制出来（避免污染内核源码树）
          mkdir -p /tmp/module_build
          cp -r ../kerneldriver/* /tmp/module_build/
          
          # 使用外部模块方式编译
          make -C $KERNEL_OUT M=/tmp/module_build modules 2>&1 | tee module_build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Module build failed, showing log tail:"
            tail -30 module_build.log
            exit 1
          fi
          
          # 查找生成的 .ko 文件
          MODULE_FILE=$(find /tmp/module_build -name "*.ko" | head -1)
          if [ ! -f "$MODULE_FILE" ]; then
            echo "Module .ko not found!"
            exit 1
          fi
          cp "$MODULE_FILE" /tmp/
          echo "MODULE_FILE=/tmp/$(basename "$MODULE_FILE")" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: kernel-driver-${{ github.event.inputs.target_arch }}
          path: ${{ env.MODULE_FILE }}
